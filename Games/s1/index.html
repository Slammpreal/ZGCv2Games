<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule II - Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;

    }
    iframe {

        height: 960px;
      }
    }
  </style>

<body>
  <iframe 
    src="https://html-classic.itch.zone/html/15626333/index.html"
