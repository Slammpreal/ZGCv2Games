<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ZGC AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
const ACTIVE_THEME_KEY = 'zgc_theme_v2_active';
function hexToRGBA(hex, alpha = 1) {
  if (!hex) return `rgba(255,255,255,${alpha})`;
  let cleaned = hex.replace('#', '');
  if (cleaned.length === 3) cleaned = cleaned.split('').map(c => c+c).join('');
  const num = parseInt(cleaned,16);
  return `rgba(${(num>>16)&255}, ${(num>>8)&255}, ${num&255}, ${alpha})`;
}
function applyTheme(theme) {
  if (!theme) return;
  const root = document.documentElement.style;
  root.setProperty('--bg-color',     theme.bg     || '#0a0a10');
  root.setProperty('--nav-color',    theme.nav    || 'rgba(13,13,22,0.75)');
  root.setProperty('--text-color',   theme.text   || '#f0f0f8');
  root.setProperty('--accent-color', theme.accent || '#ff6b9d');
  root.setProperty('--input-color',  theme.cardBg || 'rgba(255,255,255,0.08)');
  root.setProperty('--shadow-color', hexToRGBA(theme.glow || theme.accent, 0.4));
}
(function(){
  let data = localStorage.getItem(ACTIVE_THEME_KEY);
  if (data) { try { applyTheme(JSON.parse(data)); } catch(e){} }
})();
</script>

<style>
:root {
  --bg-color:     #0a0a10;
  --nav-color:    rgba(13,13,22,0.75);
  --text-color:   #f0f0f8;
  --accent-color: #ff6b9d;
  --input-color:  rgba(255,255,255,0.08);
  --shadow-color: rgba(255,107,157,0.35);
  --bg-2:   #13131d;
  --bg-3:   #1c1c2a;
  --bg-4:   #252535;
  --border: rgba(255,255,255,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', Arial, sans-serif;
  background: var(--bg-color);
  color: var(--text-color);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#vanta-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(100,180,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 85%, rgba(160,100,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

.aurora {
  position: fixed; border-radius: 50%;
  filter: blur(90px); opacity: 0.12;
  pointer-events: none; z-index: 0;
}
.aurora-1 {
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, var(--accent-color), transparent 70%);
  top: -150px; left: -100px;
  animation: auroraDrift1 30s linear infinite;
}
.aurora-2 {
  width: 500px; height: 350px;
  background: radial-gradient(ellipse, rgba(160,100,255,1), transparent 70%);
  bottom: -100px; right: -80px;
  animation: auroraDrift2 40s linear infinite;
}
.aurora-3 {
  width: 400px; height: 300px;
  background: radial-gradient(ellipse, rgba(100,230,200,1), transparent 70%);
  top: 40%; left: 50%; opacity: 0.07;
  animation: auroraDrift3 50s linear infinite;
}
@keyframes auroraDrift1 {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(120px,80px) scale(1.15); }
  66%  { transform: translate(60px,160px) scale(0.9); }
  100% { transform: translate(0,0) scale(1); }
}
@keyframes auroraDrift2 {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(-100px,-60px) scale(1.1); }
  66%  { transform: translate(-50px,-140px) scale(0.95); }
  100% { transform: translate(0,0) scale(1); }
}
@keyframes auroraDrift3 {
  0%   { transform: translate(-50%,-50%) scale(1); }
  50%  { transform: translate(-50%,-50%) scale(1.3) rotate(30deg); }
  100% { transform: translate(-50%,-50%) scale(1); }
}

#particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* NAV */
nav {
  position: fixed;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  background: var(--nav-color);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 16px;
  display: flex;
  align-items: center;
  gap: 4px;
}

nav .logo {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  font-weight: 700; font-size: 15px;
  text-decoration: none;
}
nav .logo span {
  background: linear-gradient(135deg, var(--accent-color), #c77dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

nav a.nav-link {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  color: rgba(240,240,248,0.5);
  text-decoration: none; font-size: 16px;
  transition: all 0.2s ease;
}
nav a.nav-link:hover  { background: var(--bg-3); color: var(--text-color); }
nav a.nav-link.active { background: var(--bg-3); color: var(--accent-color); }

/* LAYOUT */
.app-wrapper {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  padding: 90px 20px 20px;
  gap: 0;
  max-width: 1200px;
  width: 95%;
  margin: 0 auto;
  overflow: hidden;
  min-height: 0;
}

.app {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  min-height: 0;
}

/* SIDEBAR */
.left {
  padding: 24px 20px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: rgba(0,0,0,0.15);
}

.left h2 {
  font-size: 1.1em;
  font-weight: 800;
  letter-spacing: 0.03em;
  background: linear-gradient(135deg, var(--text-color), var(--accent-color));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.info-card {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 0.82em;
  line-height: 1.7;
  color: rgba(240,240,248,0.65);
}
.info-card strong { color: var(--accent-color); font-weight: 700; }

.status-indicator {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8em; font-weight: 700;
  padding: 9px 14px; border-radius: 10px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: rgba(240,240,248,0.6);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #00e87a; flex-shrink: 0;
  animation: pulse 2s infinite;
  box-shadow: 0 0 6px #00e87a;
}

.clear-btn {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.clear-btn button {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: rgba(240,240,248,0.5);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.clear-btn button:hover {
  background: var(--bg-3);
  border-color: var(--accent-color);
  color: var(--accent-color);
}

/* CHAT */
.main {
  display: flex; flex-direction: column;
  height: 100%; overflow: hidden;
}

.messages {
  flex: 1; overflow-y: auto;
  padding: 24px 20px;
  display: flex; flex-direction: column; gap: 14px;
  scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent;
}
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent-color), rgba(255,255,255,0.2));
  border-radius: 10px;
}
.messages::-webkit-scrollbar-track { background: transparent; }

.msg {
  max-width: 78%; padding: 12px 16px;
  border-radius: 16px;
  word-wrap: break-word; overflow-wrap: break-word;
  animation: fadeIn 0.3s ease;
  font-size: 0.92em;
  line-height: 1.6;
}
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--accent-color), #c77dff);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.meta {
  font-size: 0.72em; margin-bottom: 5px;
  font-weight: 700; opacity: 0.7;
  letter-spacing: 0.02em;
}
.msg.user .meta { color: rgba(255,255,255,0.7); }
.msg.assistant .meta { color: var(--accent-color); }

/* INPUT */
.input-row {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px;
  align-items: center;
  background: rgba(0,0,0,0.1);
}

.input-row input {
  flex: 1;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text-color);
  padding: 11px 16px;
  border-radius: 999px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.92em;
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-row input:focus {
  border-color: var(--accent-color);
  box-shadow: 0 0 0 3px rgba(255,107,157,0.12);
}
.input-row input::placeholder { color: rgba(240,240,248,0.3); font-weight: 400; }

.input-row button {
  display: flex; align-items: center; gap: 7px;
  padding: 11px 22px;
  background: linear-gradient(135deg, var(--accent-color), #c77dff);
  border: none; border-radius: 999px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88em; font-weight: 800;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 12px var(--shadow-color);
  white-space: nowrap;
}
.input-row button:hover {
  opacity: 0.9; transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--shadow-color);
}
.input-row button:active { transform: translateY(0); }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

* { scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent; }

@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
  .left { display: none; }
  .app-wrapper { padding: 80px 0 0; }
  .app { border-radius: 0; border-left: none; border-right: none; border-bottom: none; }
}
</style>
</head>
<body>

<div id="vanta-bg"></div>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>
<div id="particles-js"></div>

<nav>
  <a href="/homepage.html" class="logo">
    <i class="fa-solid fa-gamepad"></i>
    <span>WB is a loser</span>
  </a>
  <div class="nav-divider"></div>
  <a href="/homepage.html" class="nav-link"        title="Home"><i class="fa-solid fa-house"></i></a>
  <a href="/work.html"     class="nav-link"        title="Games"><i class="fa-solid fa-gamepad"></i></a>
  <a href="/chat.html"     class="nav-link active" title="Chat"><i class="fa-solid fa-comment-alt"></i></a>
  <a href="/misc.html"     class="nav-link"        title="Settings"><i class="fa-solid fa-gear"></i></a>
  <a href="/slammp.html"   class="nav-link"        title="Profile"><i class="fa-solid fa-user"></i></a>
</nav>

<div class="app-wrapper">
  <div class="app">
    <aside class="left">
      <h2>AI Assistant</h2>

      <div class="info-card">
        <strong>Model:</strong> GPT-3.5 Turbo<br>
        <strong>Status:</strong> <span id="aiStatus">Ready</span>
      </div>

      <div class="status-indicator">
        <div class="status-dot"></div>
        <span>AI Online</span>
      </div>

      <div class="clear-btn">
        <button id="clearChat">
          <i class="fas fa-trash"></i> Clear Conversation
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input id="messageInput" type="text" placeholder="Ask me anything..." />
        <button id="sendBtn">
          <i class="fas fa-paper-plane"></i> Send
        </button>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  let theme = {};
  try { theme = JSON.parse(localStorage.getItem(ACTIVE_THEME_KEY) || "{}"); } catch(e) {}

  const color = theme.glow || theme.accent || "#ff6b9d";

  function hexInt(hex) {
    if (!hex) return null;
    return parseInt(hex.replace('#',''), 16);
  }

  VANTA.FOG({
    el: '#vanta-bg',
    mouseControls: true, touchControls: true, gyroControls: false,
    minHeight: 200, minWidth: 200,
    highlightColor: hexInt(theme.accent) || 0xff6b9d,
    midtoneColor:   0x13131d,
    lowlightColor:  0x2e2e42,
    baseColor:      hexInt(theme.bg) || 0x0a0a10,
    blurFactor: 0.90, speed: 1
  });

  particlesJS("particles-js", {
    particles: {
      number: { value: 75, density: { enable: true, value_area: 800 } },
      color: { value: color },
      shape: { type: "circle" },
      opacity: { value: 0.45 },
      size: { value: 3 },
      line_linked: { enable: true, color: color, distance: 150, opacity: 0.35, width: 1 },
      move: { enable: true, speed: 2 }
    },
    interactivity: {
      events: {
        onclick: { enable: true, mode: "push" },
        onhover: { enable: true, mode: "grab" }
      },
      modes: { grab: { distance: 140, line_linked: { opacity: 1 } } }
    },
    retina_detect: true
  });
});

(function(){
  const $ = s => document.querySelector(s);
  const messagesEl = $('#messages');
  const msgInput   = $('#messageInput');
  const sendBtn    = $('#sendBtn');
  const statusEl   = $('#aiStatus');

  const API_KEY = "sk-0F093F5sSpnQghjmh1br9L0hZk6dTEDtMIZD06O4xiWwHv0Q";
  const API_URL = 'https://api.chatanywhere.tech/v1/chat/completions';

  let conversationHistory = [];

  function addMessage(text, isUser) {
    const div = document.createElement('div');
    div.className = 'msg' + (isUser ? ' user' : ' assistant');

    const time  = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const label = isUser ? 'You' : 'ZGC AI';
    const safeText = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    div.innerHTML = `
      <div class="meta">${label} · ${time}</div>
      <div class="content">${safeText}</div>
    `;

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    addMessage(text, true);
    conversationHistory.push({ role: "user", content: text });
    msgInput.value = '';

    sendBtn.disabled = true;
    msgInput.disabled = true;
    statusEl.textContent = 'Thinking...';

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        },
        body: JSON.stringify({ model: "gpt-3.5-turbo", messages: conversationHistory })
      });

      const data = await response.json();
      const aiText = data?.choices?.[0]?.message?.content || "An error occurred";

      conversationHistory.push({ role: "assistant", content: aiText });
      addMessage(aiText, false);
      statusEl.textContent = 'Ready';

    } catch(err) {
      console.error(err);
      addMessage("Sorry, an error occurred. Please try again.", false);
      statusEl.textContent = 'Error';
    } finally {
      sendBtn.disabled = false;
      msgInput.disabled = false;
      msgInput.focus();
    }
  }

  sendBtn.onclick = sendMessage;
  msgInput.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); };

  $('#clearChat').onclick = () => {
    messagesEl.innerHTML = '';
    conversationHistory = [];
    addMessage("Conversation cleared. How can I help you?", false);
  };

  addMessage("Hello! I'm WB is a loser's AI. How can I assist you today? btw WB is a complete and total degenerate", false);
})();
</script>
</body>
</html>
