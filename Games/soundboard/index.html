<!DOCTYPE html>
<html lang="en">

<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/soundboard@main/">
    <meta charset="UTF-8">
    <title>Soundboard</title>
    <link href="style.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        const ACTIVE_THEME_KEY = 'zgc_theme_v2_active';

        function hexToRGBA(hex, alpha = 1) {
            if (!hex) return `rgba(255,255,255,${alpha})`;
            let cleaned = hex.replace('#', '');
            if (cleaned.length === 3) cleaned = cleaned.split('').map(c => c + c).join('');
            const num = parseInt(cleaned, 16);
            return `rgba(${(num >> 16) & 255}, ${(num >> 8) & 255}, ${num & 255}, ${alpha})`;
        }

        function applyTheme(theme) {
            if (!theme) return;
            const root = document.documentElement.style;
            root.setProperty('--bg-color',     theme.bg     || '#0a0a10');
            root.setProperty('--nav-color',    theme.nav    || 'rgba(13,13,22,0.75)');
            root.setProperty('--text-color',   theme.text   || '#f0f0f8');
            root.setProperty('--accent-color', theme.accent || '#ff6b9d');
            root.setProperty('--input-color',  theme.cardBg || 'rgba(255,255,255,0.08)');
            root.setProperty('--shadow-color', hexToRGBA(theme.glow || theme.accent, 0.4));
        }

        (function () {
            let data = localStorage.getItem(ACTIVE_THEME_KEY);
            if (data) { try { applyTheme(JSON.parse(data)); } catch (e) {} }
        })();
    </script>

    <style>
        :root {
            --bg-color:     #0a0a10;
            --nav-color:    rgba(13,13,22,0.75);
            --text-color:   #f0f0f8;
            --accent-color: #ff6b9d;
            --input-color:  rgba(255,255,255,0.08);
            --shadow-color: rgba(255,107,157,0.35);
            --bg-2:   #13131d;
            --bg-3:   #1c1c2a;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #vanta-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(100,180,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 85%, rgba(160,100,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }

        .aurora {
            position: fixed; border-radius: 50%;
            filter: blur(90px); opacity: 0.12;
            pointer-events: none; z-index: 0;
        }
        .aurora-1 {
            width: 600px; height: 400px;
            background: radial-gradient(ellipse, var(--accent-color), transparent 70%);
            top: -150px; left: -100px;
            animation: auroraDrift1 30s linear infinite;
        }
        .aurora-2 {
            width: 500px; height: 350px;
            background: radial-gradient(ellipse, rgba(160,100,255,1), transparent 70%);
            bottom: -100px; right: -80px;
            animation: auroraDrift2 40s linear infinite;
        }
        .aurora-3 {
            width: 400px; height: 300px;
            background: radial-gradient(ellipse, rgba(100,230,200,1), transparent 70%);
            top: 40%; left: 50%; opacity: 0.07;
            animation: auroraDrift3 50s linear infinite;
        }
        @keyframes auroraDrift1 {
            0%   { transform: translate(0,0) scale(1); }
            33%  { transform: translate(120px,80px) scale(1.15); }
            66%  { transform: translate(60px,160px) scale(0.9); }
            100% { transform: translate(0,0) scale(1); }
        }
        @keyframes auroraDrift2 {
            0%   { transform: translate(0,0) scale(1); }
            33%  { transform: translate(-100px,-60px) scale(1.1); }
            66%  { transform: translate(-50px,-140px) scale(0.95); }
            100% { transform: translate(0,0) scale(1); }
        }
        @keyframes auroraDrift3 {
            0%   { transform: translate(-50%,-50%) scale(1); }
            50%  { transform: translate(-50%,-50%) scale(1.3) rotate(30deg); }
            100% { transform: translate(-50%,-50%) scale(1); }
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* NAV */
        nav {
            position: fixed;
            top: 18px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: var(--nav-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        nav .logo {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px;
            font-weight: 700; font-size: 15px;
            color: var(--accent-color);
            text-decoration: none;
        }

        nav .logo span {
            background: linear-gradient(135deg, var(--accent-color), #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

        nav a.nav-link {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%;
            color: rgba(240,240,248,0.5);
            text-decoration: none; font-size: 16px;
            transition: all 0.2s ease;
        }
        nav a.nav-link:hover,
        nav a.nav-link.active { background: var(--bg-3); color: var(--text-color); }
        nav a.nav-link.active  { color: var(--accent-color); }

        /* CONTENT */
        #controls {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 100px;
            width: 90%;
            max-width: 900px;
            padding: 16px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        #searchInput {
            margin-left: auto;
            width: 220px;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-3);
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }
        #searchInput:focus { border-color: var(--accent-color); }
        #searchInput::placeholder { color: rgba(240,240,248,0.3); font-weight: 400; }

        .control-button {
            padding: 9px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--bg-3);
            color: rgba(240,240,248,0.7);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.88em;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .control-button:hover {
            background: var(--bg-3);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        #soundboard {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 900px;
            margin-top: 16px;
            margin-bottom: 40px;
        }

        .footer-credit {
            position: relative;
            z-index: 10;
            text-align: center;
            font-size: 0.78em;
            color: rgba(240,240,248,0.3);
            margin-bottom: 20px;
        }

        * { scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent; }
        *::-webkit-scrollbar { width: 6px; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-color), rgba(255,255,255,0.3));
            border-radius: 10px;
        }

        @media (max-width: 550px) {
            #searchInput { width: 100%; margin-left: 0; }
        }
    </style>
</head>

<body>

<div id="vanta-bg"></div>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>
<div id="particles-js"></div>

<nav>
    <a href="/homepage.html" class="logo">
        <i class="fa-solid fa-gamepad"></i>
        <span>WB is a loser</span>
    </a>
    <div class="nav-divider"></div>
    <a href="/homepage.html" class="nav-link" title="Home"><i class="fa-solid fa-house"></i></a>
    <a href="/work.html"     class="nav-link" title="Games"><i class="fa-solid fa-gamepad"></i></a>
    <a href="/chat.html"     class="nav-link" title="Chat"><i class="fa-solid fa-comment-alt"></i></a>
    <a href="/misc.html"     class="nav-link" title="Settings"><i class="fa-solid fa-gear"></i></a>
    <a href="/slammp.html"   class="nav-link" title="Profile"><i class="fa-solid fa-user"></i></a>
</nav>

<div id="controls">
    <button id="toggleFavorites" class="control-button favorites-toggle">⭐ Favorites: OFF</button>
    <button id="toggleButton"    class="control-button overlap-toggle">🔇 Overlap: OFF</button>
    <button id="stopButton"      class="control-button stop-button">⏹️ Stop All Sounds</button>
    <input id="searchInput" type="text" placeholder="Search sounds...">
</div>

<div id="soundboard"></div>

<div class="footer-credit">
    Credit to GN Math for the soundboard (I DIDN'T MAKE THIS)
</div>

<script src="sounds.js" type="module"></script>
<script src="main.js" type="module"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        let theme = {};
        try { theme = JSON.parse(localStorage.getItem(ACTIVE_THEME_KEY) || "{}"); } catch (e) {}

        const color = theme.glow || theme.accent || "#ff6b9d";

        function hexInt(hex) {
            if (!hex) return null;
            return parseInt(hex.replace('#', ''), 16);
        }

        VANTA.FOG({
            el: '#vanta-bg',
            mouseControls: true, touchControls: true, gyroControls: false,
            minHeight: 200, minWidth: 200,
            highlightColor: hexInt(theme.accent) || 0xff6b9d,
            midtoneColor:   0x13131d,
            lowlightColor:  0x2e2e42,
            baseColor:      hexInt(theme.bg) || 0x0a0a10,
            blurFactor: 0.90, speed: 1
        });

        particlesJS("particles-js", {
            particles: {
                number: { value: 75, density: { enable: true, value_area: 800 } },
                color: { value: color },
                shape: { type: "circle" },
                opacity: { value: 0.45 },
                size: { value: 3 },
                line_linked: { enable: true, color: color, distance: 150, opacity: 0.35, width: 1 },
                move: { enable: true, speed: 2 }
            },
            interactivity: {
                events: {
                    onclick: { enable: true, mode: "push" },
                    onhover: { enable: true, mode: "grab" }
                },
                modes: { grab: { distance: 140, line_linked: { opacity: 1 } } }
            },
            retina_detect: true
        });
    });
</script>
</body>
</html>
